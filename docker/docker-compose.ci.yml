services:
  php:
    build:
      target: ci
      dockerfile: Dockerfile.php
    volumes:
      - ..:/var/www/html/
    depends_on:
      - mariadb
  node:
    build:
      target: ci
      dockerfile: Dockerfile.node
    volumes:
      - ..:/usr/src/app/
    working_dir: /usr/src/app/
  mailpit:
    image: axllent/mailpit
  schedule:
    build:
      target: ci
      dockerfile: Dockerfile.php
    volumes:
      - ..:/var/www/html/
  mariadb:
    environment:
      MARIADB_ROOT_PASSWORD: "cirootpassword"
      MARIADB_DATABASE: "cidatabase"
      MARIADB_USER: "ciuser"
      MARIADB_PASSWORD: "cipassword"
  queue:
    build:
      target: ci
      dockerfile: Dockerfile.php
    volumes:
      - ..:/var/www/html/
