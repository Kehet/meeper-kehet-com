name: Laravel tests

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
  workflow_run:
    workflows: ["Auto pull request"]
    types:
      - completed

permissions:
  contents: read

jobs:
  laravel-tests:
    uses: Kehet/shared-github-workflows/.github/workflows/laravel-tests.yml@master
    with:
      php-version: '8.3'
